<span class="line"><span class="comment">#include &lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	int secs;</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	for (secs = 5; secs &gt;0; secs--)</span></span><br><span class="line"><span class="comment">		printf(&quot;%d seconds! \n&quot;,secs);</span></span><br><span class="line"><span class="comment">	printf(&quot;We have ignition!\n&quot;);</span></span><br><span class="line"><span class="comment">	return 0;</span></span><br><span class="line"><span class="comment">	 </span></span><br><span class="line"><span class="comment"> &#125; </span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"> </span><br><span class="line"><span class="comment">//可以让计数器递增2、10等</span></span><br><span class="line"><span class="comment">//2、for_13s.c</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">#include&lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	int n; //从2开始，每次递增13</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	for(n=2; n&lt;60; n=n+13)</span></span><br><span class="line"><span class="comment">		printf(&quot;%d \n&quot;,n);</span></span><br><span class="line"><span class="comment">	return 0; </span></span><br><span class="line"><span class="comment">&#125;</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//可以用字符代替数字计数</span></span><br><span class="line"><span class="comment">//3、for_char.c</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">#include&lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	char ch;</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	for(ch = &#x27;a&#x27;;ch&lt;=&#x27;z&#x27;; ch++)</span></span><br><span class="line"><span class="comment">		printf(&quot;The ASCII value for %c is %d.\n&quot;,ch,ch);</span></span><br><span class="line"><span class="comment">	return 0;</span></span><br><span class="line"><span class="comment"> &#125;</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"> </span><br><span class="line"><span class="comment">//改for_cube </span></span><br><span class="line"><span class="comment">//4、for_cube.c 使用for循环创建一个立方表</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">#include &lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	int num;</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	printf(&quot;    n  n  cubed\n&quot;);</span></span><br><span class="line"><span class="comment">	//for (num=1; num&lt;=6; num++)</span></span><br><span class="line"><span class="comment">	for(num=1;num*num*num&lt;=216;num++) //改成这个  </span></span><br><span class="line"><span class="comment">	//如果与控制循环次数相比，你更关心限制立方的大小，就可以使用这样的测试条件 </span></span><br><span class="line"><span class="comment">		printf(&quot;%5d %5d\n&quot;,num,num*num*num);</span></span><br><span class="line"><span class="comment">		</span></span><br><span class="line"><span class="comment">	return 0; </span></span><br><span class="line"><span class="comment"> &#125; </span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"> </span><br><span class="line"><span class="comment">//可以让递增的量几何增长，而不是算数增长，也就是说，每次都乘上而不是加上一个固定的量：</span></span><br><span class="line"><span class="comment">//5、for_geo.c</span></span><br><span class="line"><span class="comment">/* </span></span><br><span class="line"><span class="comment">#include&lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	double debt;</span></span><br><span class="line"><span class="comment">	for (debt =100.0;debt&lt;150;debt=debt*1.1)</span></span><br><span class="line"><span class="comment">		printf(&quot;Your debt is now $%.2f.\n&quot;,debt);</span></span><br><span class="line"><span class="comment">	return 0;</span></span><br><span class="line"><span class="comment"> &#125; </span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"> </span><br><span class="line"> <span class="comment">//第3个表达式可以使用任意合法的表达式。无论是什么表达式，每次迭代都会更新该表达式的值</span></span><br><span class="line"> <span class="comment">//6、for_wild.c</span></span><br><span class="line"> <span class="comment">/*</span></span><br><span class="line"><span class="comment"> #include &lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment"> int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	int x;</span></span><br><span class="line"><span class="comment">	int y=55;</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	for(x=1;y&lt;=75;y=(++x*5)+50)</span></span><br><span class="line"><span class="comment">		printf(&quot;%10d %10d\n&quot;,x,y);</span></span><br><span class="line"><span class="comment">	return 0;</span></span><br><span class="line"><span class="comment"> &#125; </span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//可以省略一个或多个表达式(但是不能省略分号),只要在循环中包含能结束循环的语句即可</span></span><br><span class="line"><span class="comment">//7、for_none.c</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">#include &lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	int ans,n;</span></span><br><span class="line"><span class="comment">	ans=2;</span></span><br><span class="line"><span class="comment">	for (n=3;ans&lt;=25;)</span></span><br><span class="line"><span class="comment">		ans=ans*n;</span></span><br><span class="line"><span class="comment">	printf(&quot;n=%d;ans=%d.\n&quot;,n,ans);</span></span><br><span class="line"><span class="comment">	return 0;</span></span><br><span class="line"><span class="comment">&#125;</span></span><br><span class="line"><span class="comment">*/</span></span><br><span class="line"></span><br><span class="line"><span class="comment">//第一个表达式不一定是给变量赋初值，也可以使用printf()。记住，在执行循环的其他部分之前，只对第一个表达式求值一次或执行一次</span></span><br><span class="line"><span class="comment">//8、for_show.c</span></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">#include &lt;stdio.h&gt;</span></span><br><span class="line"><span class="comment">int main(void)</span></span><br><span class="line"><span class="comment">&#123;</span></span><br><span class="line"><span class="comment">	int num=0;</span></span><br><span class="line"><span class="comment">	</span></span><br><span class="line"><span class="comment">	for(printf(&quot;Keep entering numbers!\n&quot;); num!=6;)</span></span><br><span class="line"><span class="comment">		scanf(&quot;%d&quot;,&amp;num);</span></span><br><span class="line"><span class="comment">	printf(&quot;That&#x27;s the one I want!\n&quot;);</span></span><br><span class="line"><span class="comment">	return 0;</span></span><br><span class="line"><span class="comment"> &#125;</span></span><br><span class="line"><span class="comment"> */</span></span><br><span class="line"> </span><br><span class="line"><span class="comment">//9、 </span></span><br><span class="line"> <span class="comment">//循环体中的行为可以改变循环头中的表达式。例如，假设出创建了下面的循环:</span></span><br><span class="line"> <span class="keyword">for</span> (n=<span class="number">1</span>;n&lt;<span class="number">10000</span>; n=n+delta)</span><br><span class="line"> <span class="comment">//如果程序经过几次迭代后发现delta太小或太大，循环中的if语句可以改变delta的大小。 </span></span><br><span class="line"></span><br></pre></td></tr></table></figure>
