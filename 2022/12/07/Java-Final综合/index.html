rd">return</span> <span class="literal">true</span>;</span><br><span class="line">		<span class="keyword">if</span> (obj == <span class="literal">null</span>)</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">		<span class="keyword">if</span> (getClass() != obj.getClass())</span><br><span class="line">			<span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">		<span class="type">Test</span> <span class="variable">other</span> <span class="operator">=</span> (Test) obj;</span><br><span class="line">		<span class="keyword">return</span> Objects.equals(maps, other.maps);</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">//右键 源码 生成hashcode和equals END</span></span><br><span class="line">	</span><br><span class="line">	<span class="comment">//添加</span></span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">void</span> <span class="title function_">addMap</span><span class="params">(String id,String name,String sex,<span class="type">int</span> age,String major,<span class="type">int</span> score)</span> </span><br><span class="line">	&#123;</span><br><span class="line">		Student stu=<span class="keyword">new</span> <span class="title class_">Student</span>(id, name, sex, major, age, score);</span><br><span class="line">		maps.put(id,stu); <span class="comment">//id为key stu为值</span></span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">	<span class="comment">//删除</span></span><br><span class="line">	<span class="keyword">public</span> <span class="keyword">void</span> <span class="title function_">delMap</span><span class="params">(String id)</span> </span><br><span class="line">	&#123;</span><br><span class="line">		maps.remove(id);</span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">	<sp
